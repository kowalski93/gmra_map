<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Footprint</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
  :root {
    --color-bg: #f5f0e8;
    --color-surface: #faf7f2;
    --color-text: #1e2d40;
    --color-text-muted: #6b7280;
    --color-label: #b5892a;
    --western: #4a6fa5;
    --central: #1e3a5f;
    --eastern: #c4a052;
    --state-border: #f5f0e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--color-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 40px;
  }
  .page-header { width: 100%; max-width: 960px; margin-bottom: 32px; }
  .eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--color-label); margin-bottom: 10px;
  }
  h1 {
    font-family: Georgia, serif;
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    font-weight: 400; color: var(--color-text);
    line-height: 1.15; margin-bottom: 10px;
  }
  .subtitle { font-size: 14px; color: var(--color-text-muted); line-height: 1.5; }
  .map-container { width: 100%; max-width: 860px; position: relative; }
  #map svg { width: 100%; height: auto; display: block; }
  .state {
    stroke: var(--state-border); stroke-width: 1.2;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  .state:hover { filter: brightness(1.15); }
  .state-label {
    font-size: 9px; font-weight: 700; fill: rgba(255,255,255,0.9);
    text-anchor: middle; dominant-baseline: central;
    pointer-events: none; letter-spacing: 0.02em;
  }
  .state-label.eastern { fill: rgba(30,20,0,0.7); }
  .legend {
    display: flex; gap: 48px; margin-top: 32px;
    flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 860px; padding: 0 8px;
  }
  .legend-item {
    display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer; transition: opacity 0.15s;
  }
  .legend-item:hover { opacity: 0.75; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
  .legend-text strong { display: block; font-size: 13px; font-weight: 700; color: var(--color-text); margin-bottom: 2px; }
  .legend-text span { font-size: 12px; color: var(--color-text-muted); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,30,45,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--color-surface);
    border-radius: 14px; padding: 36px 40px;
    max-width: 360px; width: 90%; position: relative;
    box-shadow: 0 24px 64px rgba(20,30,45,0.22), 0 4px 16px rgba(20,30,45,0.1);
    transform: translateY(14px) scale(0.96);
    transition: transform 0.24s cubic-bezier(0.16,1,0.3,1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 20px;
    color: white; margin-bottom: 18px;
  }
  .modal-badge.eastern { color: #2a1800; }
  .modal h2 {
    font-family: Georgia, serif; font-size: 1.45rem;
    font-weight: 400; color: var(--color-text); margin-bottom: 4px;
  }
  .modal-sub { font-size: 13px; color: var(--color-text-muted); margin-bottom: 22px; }
  .modal-divider { height: 1px; background: #e5ddd0; margin-bottom: 20px; }
  .modal-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .modal-row svg { flex-shrink: 0; color: #8a9ab0; }
  .modal-row p, .modal-row a {
    font-size: 14px; font-weight: 500; color: var(--color-text); text-decoration: none;
  }
  .modal-row a:hover { text-decoration: underline; }
  .modal-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; cursor: pointer;
    color: var(--color-text-muted); font-size: 22px;
    line-height: 1; padding: 4px 8px; border-radius: 6px;
    transition: background 0.15s;
  }
  .modal-close:hover { background: #ede8df; color: var(--color-text); }
</style>
</head>
<body>

<div class="page-header">
  <p class="eyebrow">Market Footprint</p>
  <h1>Serving physicians across 48 states</h1>
  <p class="subtitle">Three regional hubs — select a region to connect with your local team.</p>
</div>

<div class="map-container"><div id="map"></div></div>

<div class="legend">
  <div class="legend-item" onclick="showModal('western')">
    <div class="legend-swatch" style="background:var(--western)"></div>
    <div class="legend-text"><strong>Western Region</strong><span>Denver Office · 11 states</span></div>
  </div>
  <div class="legend-item" onclick="showModal('central')">
    <div class="legend-swatch" style="background:var(--central)"></div>
    <div class="legend-text"><strong>Central Region</strong><span>Dallas Office · 16 states</span></div>
  </div>
  <div class="legend-item" onclick="showModal('eastern')">
    <div class="legend-swatch" style="background:var(--eastern)"></div>
    <div class="legend-text"><strong>Eastern Region</strong><span>Miami Office · 21 states</span></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlay(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    <div class="modal-badge" id="mBadge"></div>
    <h2 id="mTitle"></h2>
    <p class="modal-sub" id="mSub"></p>
    <div class="modal-divider"></div>
    <div class="modal-row">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <p id="mOffice"></p>
    </div>
    <div class="modal-row">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.71 3.18 2 2 0 0 1 3.68 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.62a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <a id="mPhone" href=""></a>
    </div>
  </div>
</div>

<script>
const regions = {
  western:{ label:'Western Region', states:'11 states served', office:'Denver Office, CO', phone:'(303) 622-3252', color:'#4a6fa5', isEastern:false },
  central:{ label:'Central Region', states:'16 states served', office:'Dallas Office, TX', phone:'(214) 564-8042', color:'#1e3a5f', isEastern:false },
  eastern:{ label:'Eastern Region', states:'21 states served', office:'Miami Office, FL', phone:'(305) 842-2520', color:'#c4a052', isEastern:true }
};

const stateRegions = {
  WA:'western',OR:'western',CA:'western',NV:'western',ID:'western',MT:'western',
  WY:'western',UT:'western',AZ:'western',CO:'western',NM:'western',
  ND:'central',SD:'central',NE:'central',KS:'central',OK:'central',TX:'central',
  MN:'central',IA:'central',MO:'central',AR:'central',LA:'central',
  WI:'central',IL:'central',MS:'central',IN:'central',
  ME:'eastern',NH:'eastern',VT:'eastern',MA:'eastern',RI:'eastern',CT:'eastern',
  NY:'eastern',NJ:'eastern',DE:'eastern',MD:'eastern',DC:'eastern',
  PA:'eastern',WV:'eastern',VA:'eastern',NC:'eastern',SC:'eastern',
  GA:'eastern',FL:'eastern',AL:'eastern',TN:'eastern',KY:'eastern',OH:'eastern',MI:'eastern'
};

const regionColors = { western:'#4a6fa5', central:'#1e3a5f', eastern:'#c4a052' };

function showModal(r) {
  const d = regions[r];
  const badge = document.getElementById('mBadge');
  badge.textContent = d.label;
  badge.style.background = d.color;
  badge.className = 'modal-badge' + (d.isEastern ? ' eastern' : '');
  document.getElementById('mTitle').textContent = d.office;
  document.getElementById('mSub').textContent = d.states;
  document.getElementById('mOffice').textContent = d.office;
  const ph = document.getElementById('mPhone');
  ph.textContent = d.phone;
  ph.href = 'tel:' + d.phone.replace(/[^0-9]/g,'');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function handleOverlay(e) { if(e.target.id==='modalOverlay') closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// FIPS → abbr
const fips = {"01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL","18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD","25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD","47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV","55":"WI","56":"WY"};

const W=860, H=520;
const proj = d3.geoAlbersUsa().scale(1060).translate([W/2, H/2]);
const pathGen = d3.geoPath().projection(proj);

const svg = d3.select('#map').append('svg')
  .attr('viewBox', `0 0 ${W} ${H}`)
  .attr('preserveAspectRatio','xMidYMid meet');

const hideLabels = new Set(['RI','CT','DE','DC','NJ','NH','VT','MD','MA','AK','HI']);

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
  const states = topojson.feature(us, us.objects.states);

  svg.selectAll('.state')
    .data(states.features)
    .enter().append('path')
      .attr('class','state')
      .attr('d', pathGen)
      .attr('fill', d => {
        const abbr = fips[String(d.id).padStart(2,'0')];
        const r = stateRegions[abbr];
        return r ? regionColors[r] : '#ccc';
      })
      .on('click', (_,d) => {
        const abbr = fips[String(d.id).padStart(2,'0')];
        const r = stateRegions[abbr];
        if(r) showModal(r);
      });

  svg.selectAll('.state-label')
    .data(states.features)
    .enter().append('text')
      .attr('class', d => {
        const abbr = fips[String(d.id).padStart(2,'0')];
        return 'state-label' + (stateRegions[abbr]==='eastern' ? ' eastern' : '');
      })
      .attr('x', d => pathGen.centroid(d)[0] || 0)
      .attr('y', d => pathGen.centroid(d)[1] || 0)
      .text(d => {
        const abbr = fips[String(d.id).padStart(2,'0')];
        return (abbr && !hideLabels.has(abbr)) ? abbr : '';
      });
});
</script>
</body>
</html>
