document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }\n  .modal-row svg { flex-shrink: 0; color: #8a9ab0; }\n  .modal-row p, .modal-row a {\n    font-size: 14px; font-weight: 500; color: var(--color-text); text-decoration: none;\n  }\n  .modal-row a:hover { text-decoration: underline; }\n  .modal-close {\n    position: absolute; top: 12px; right: 14px;\n    background: none; border: none; cursor: pointer;\n    color: var(--color-text-muted); font-size: 22px;\n    line-height: 1; padding: 4px 8px; border-radius: 6px;\n    transition: background 0.15s;\n  }\n  .modal-close:hover { background: #ede8df; color: var(--color-text); }\n  .modal-logo {\n   margin-bottom: 16px;\n   padding-bottom: 16px;\n   border-bottom: 1px solid #e5ddd0;\n    }\n  .modal-logo img {\n   max-width: 180px;\n   height: auto;\n   display: block;\n    }\n\n  /* HQ marker */\n  .hq-pulse {\n    transform-box: fill-box;\n    transform-origin: center;\n    animation: hqPulse 2.4s ease-out infinite;\n  }\n  @keyframes hqPulse {\n    0%   { transform: scale(0.6); opacity: 0.55; }\n    80%  { transform: scale(2.4); opacity: 0; }\n    100% { transform: scale(2.4); opacity: 0; }\n  }\n  .hq-group { cursor: pointer; }\n  .hq-group:hover .hq-core { filter: brightness(1.08); }\n  .hq-label-bg {\n    fill: #ffffff;\n    stroke: rgba(20,30,45,0.10);\n    stroke-width: 1;\n  }\n  .hq-label-text {\n    font-size: 9.5px;\n    font-weight: 700;\n    letter-spacing: 0.04em;\n    fill: var(--color-text);\n    dominant-baseline: central;\n    pointer-events: none;\n  }\n<\u002Fstyle>   \n<\u002Fhead>\n<body>\n\n\n<div class=\"page-header\">\n  <h1>Serving physicians across 48 states<\u002Fh1>\n  <p class=\"subtitle\">Three regional hubs — select a region to connect with your local team.<\u002Fp>\n<\u002Fdiv>\n\n<div class=\"map-container\"><div id=\"map\"><\u002Fdiv><\u002Fdiv>\n\n<div class=\"legend\">\n  <div class=\"legend-item\" onclick=\"showModal('western')\">\n    <div class=\"legend-swatch\" style=\"background:var(--western)\"><\u002Fdiv>\n    <div class=\"legend-text\"><strong>Western Region<\u002Fstrong><span>Denver Office · 11 states<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"legend-item\" onclick=\"showModal('central')\">\n    <div class=\"legend-swatch\" style=\"background:var(--central)\"><\u002Fdiv>\n    <div class=\"legend-text\"><strong>Central Region<\u002Fstrong><span>Dallas Office · 16 states<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"legend-item\" onclick=\"showModal('eastern')\">\n    <div class=\"legend-swatch\" style=\"background:var(--eastern)\"><\u002Fdiv>\n    <div class=\"legend-text\"><strong>Eastern Region<\u002Fstrong><span>Miami Office · 21 states<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-overlay\" id=\"modalOverlay\" onclick=\"handleOverlay(event)\">\n  <div class=\"modal\" id=\"modal\">\n    <div class=\"modal-logo\">\n    <img src=\"https://www.globemedllc.com/wp-content/uploads/2025/12/Globe-Medical-Realty-Advisors-new-logo-2026.png\" alt=\"Globe Medical Realty Advisors\" width=\"150\" height=\"50\" loading=\"lazy\">\n    <\u002Fdiv>\n    <button class=\"modal-close\" onclick=\"closeModal()\" aria-label=\"Close\">×<\u002Fbutton>\n    <div class=\"modal-badge\" id=\"mBadge\"><\u002Fdiv>\n    <h2 id=\"mTitle\"><\u002Fh2>\n    <p class=\"modal-sub\" id=\"mSub\"><\u002Fp>\n    <div class=\"modal-divider\"><\u002Fdiv>\n    <div class=\"modal-row\">\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n      <a id=\"mOffice\" href=\"\" target=\"_blank\" rel=\"noopener noreferrer\"><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"modal-row\">\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.71 3.18 2 2 0 0 1 3.68 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.62a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg>\n      <a id=\"mPhone\" href=\"\"><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst regions = {\n  western:{ label:'Western Region', states:'11 states served', office:'Denver Office, CO', phone:'(303) 622-3252', color:'#4a6fa5', isEastern:false, url:'https://www.globemedllc.com/contact/denver/' },\n  central:{ label:'Central Region', states:'16 states served', office:'Dallas Office, TX', phone:'(214) 564-8042', color:'#1e3a5f', isEastern:false, url:'https://www.globemedllc.com/contact/dallas/' },\n  eastern:{ label:'Eastern Region', states:'21 states served', office:'Miami Office, FL', phone:'(305) 842-2520', color:'#117aca', isEastern:true, url:'https://www.globemedllc.com/contact/miami/' }\n};\n\nconst stateRegions = {\n  WA:'western',OR:'western',CA:'western',NV:'western',ID:'western',MT:'western',\n  WY:'western',UT:'western',AZ:'western',CO:'western',NM:'western',\n  ND:'central',SD:'central',NE:'central',KS:'central',OK:'central',TX:'central',\n  MN:'central',IA:'central',MO:'central',AR:'central',LA:'central',\n  WI:'central',IL:'central',MS:'central',IN:'central',\n  ME:'eastern',NH:'eastern',VT:'eastern',MA:'eastern',RI:'eastern',CT:'eastern',\n  NY:'eastern',NJ:'eastern',DE:'eastern',MD:'eastern',DC:'eastern',\n  PA:'eastern',WV:'eastern',VA:'eastern',NC:'eastern',SC:'eastern',\n  GA:'eastern',FL:'eastern',AL:'eastern',TN:'eastern',KY:'eastern',OH:'eastern',MI:'eastern'\n};\n\nconst regionColors = { western:'#4a6fa5', central:'#1e3a5f', eastern:'#117aca' };\n\nfunction showModal(r) {\n  const d = regions[r];\n  const badge = document.getElementById('mBadge');\n  badge.textContent = d.label;\n  badge.style.background = d.color;\n  badge.className = 'modal-badge' + (d.isEastern ? ' eastern' : '');\n  document.getElementById('mTitle').textContent = d.office;\n  document.getElementById('mSub').textContent = d.states;\n  const officeEl = document.getElementById('mOffice');\n  officeEl.textContent = d.office;\n  officeEl.href = d.url;\n  const ph = document.getElementById('mPhone');\n  ph.textContent = d.phone;\n  ph.href = 'tel:' + d.phone.replace(/[^0-9]/g,'');\n  document.getElementById('modalOverlay').classList.add('open');\n}\nfunction closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }\nfunction handleOverlay(e) { if(e.target.id==='modalOverlay') closeModal(); }\ndocument.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });\n\n// FIPS → abbr\nconst fips = {\"01\":\"AL\",\"02\":\"AK\",\"04\":\"AZ\",\"05\":\"AR\",\"06\":\"CA\",\"08\":\"CO\",\"09\":\"CT\",\"10\":\"DE\",\"11\":\"DC\",\"12\":\"FL\",\"13\":\"GA\",\"15\":\"HI\",\"16\":\"ID\",\"17\":\"IL\",\"18\":\"IN\",\"19\":\"IA\",\"20\":\"KS\",\"21\":\"KY\",\"22\":\"LA\",\"23\":\"ME\",\"24\":\"MD\",\"25\":\"MA\",\"26\":\"MI\",\"27\":\"MN\",\"28\":\"MS\",\"29\":\"MO\",\"30\":\"MT\",\"31\":\"NE\",\"32\":\"NV\",\"33\":\"NH\",\"34\":\"NJ\",\"35\":\"NM\",\"36\":\"NY\",\"37\":\"NC\",\"38\":\"ND\",\"39\":\"OH\",\"40\":\"OK\",\"41\":\"OR\",\"42\":\"PA\",\"44\":\"RI\",\"45\":\"SC\",\"46\":\"SD\",\"47\":\"TN\",\"48\":\"TX\",\"49\":\"UT\",\"50\":\"VT\",\"51\":\"VA\",\"53\":\"WA\",\"54\":\"WV\",\"55\":\"WI\",\"56\":\"WY\"};\n\nconst W=860, H=520;\nconst proj = d3.geoAlbersUsa().scale(1060).translate([W/2, H/2]);\nconst pathGen = d3.geoPath().projection(proj);\n\nconst svg = d3.select('#map').append('svg')\n  .attr('viewBox', `0 0 ${W} ${H}`)\n  .attr('preserveAspectRatio','xMidYMid meet');\n\n// Reusable defs: drop shadow for HQ markers\nconst defs = svg.append('defs');\nconst shadow = defs.append('filter')\n  .attr('id','hqShadow')\n  .attr('x','-60%').attr('y','-60%')\n  .attr('width','220%').attr('height','220%');\nshadow.append('feGaussianBlur').attr('in','SourceAlpha').attr('stdDeviation',1.4);\nshadow.append('feOffset').attr('dx',0).attr('dy',1.2).attr('result','off');\nshadow.append('feComponentTransfer').append('feFuncA').attr('type','linear').attr('slope',0.35);\nconst merge = shadow.append('feMerge');\nmerge.append('feMergeNode');\nmerge.append('feMergeNode').attr('in','SourceGraphic');\n\nconst hideLabels = new Set(['RI','CT','DE','DC','NJ','NH','VT','MD','MA','AK','HI']);\n\nd3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {\n  const states = topojson.feature(us, us.objects.states);\n\n  svg.selectAll('.state')\n    .data(states.features)\n    .enter().append('path')\n      .attr('class','state')\n      .attr('d', pathGen)\n      .attr('fill', d => {\n        const abbr = fips[String(d.id).padStart(2,'0')];\n        const r = stateRegions[abbr];\n        return r ? regionColors[r] : 'none';\n      })\n\t  .attr('stroke', d => {                                    \n        const abbr = fips[String(d.id).padStart(2,'0')];\n        return stateRegions[abbr] ? 'var(--state-border)' : 'none';\n\t  })\n\t  .attr('pointer-events', d => {                            \n\t    const abbr = fips[String(d.id).padStart(2,'0')];\n\t    return stateRegions[abbr] ? 'all' : 'none';\n      })\n      .on('click', (_,d) => {\n        const abbr = fips[String(d.id).padStart(2,'0')];\n        const r = stateRegions[abbr];\n        if(r) showModal(r);\n      });\n\n  svg.selectAll('.state-label')\n    .data(states.features)\n    .enter().append('text')\n      .attr('class', d => {\n        const abbr = fips[String(d.id).padStart(2,'0')];\n        return 'state-label' + (stateRegions[abbr]==='eastern' ? ' eastern' : '');\n      })\n      .attr('x', d => {\n\t\tconst abbr = fips[String(d.id).padStart(2,'0')];\n\t\tconst offsets = { LA: -10, FL: 15 };\n\t\treturn (pathGen.centroid(d)[0] || 0) + (offsets[abbr] || 0);\n\t  })\n\t  .attr('y', d => {\n\t\tconst abbr = fips[String(d.id).padStart(2,'0')];\n\t\tconst offsets = { LA: -8, FL: 20 };\n\t\treturn (pathGen.centroid(d)[1] || 0) + (offsets[abbr] || 0);\n\t  })\n      .text(d => {\n        const abbr = fips[String(d.id).padStart(2,'0')];\n        return (abbr && !hideLabels.has(abbr)) ? abbr : '';\n      });\n  // Callout definitions: [abbr, labelX, labelY]\n  const callouts = [\n\n    { abbr:'NH', lx: 810, ly: 145 },\n\t{ abbr:'VT', lx: 810, ly: 160 },\n    { abbr:'MA', lx: 810, ly: 180 },\n\t{ abbr:'RI', lx: 810, ly: 195 },\n    { abbr:'CT', lx: 810, ly: 210 },\n    { abbr:'NJ', lx: 810, ly: 224 },\n    { abbr:'DE', lx: 810, ly: 245 },\n    { abbr:'MD', lx: 810, ly: 260 },\n\t{ abbr:'DC', lx: 810, ly: 270 },\n\t\n  ];\n  \n  callouts.forEach(({ abbr, lx, ly }) => {\n    const feature = states.features.find(d =>\n      fips[String(d.id).padStart(2,'0')] === abbr\n    );\n    if (!feature) return;\n  \n    const [cx, cy] = pathGen.centroid(feature);\n  \n    // Leader line\n    svg.append('line')\n      .attr('x1', cx).attr('y1', cy)\n      .attr('x2', lx).attr('y2', ly)\n      .attr('stroke', 'rgba(0,0,0,1)')\n      .attr('stroke-width', 0.6)\n      .attr('pointer-events', 'none');\n  \n    // Small dot at state centroid\n    svg.append('circle')\n      .attr('cx', cx).attr('cy', cy)\n      .attr('r', 1.5)\n      .attr('fill', 'rgba(100,130,160,0.6)')\n      .attr('pointer-events', 'none');\n  \n    // Label\n    svg.append('text')\n      .attr('x', lx + 5).attr('y', ly + 3.5)\n      .attr('font-size', '7.5px')\n      .attr('font-weight', '700')\n      .attr('font-family', 'inherit')\n      .attr('fill', 'rgba(30,45,64,0.75)')\n      .attr('letter-spacing', '0.03em')\n      .attr('text-anchor', 'start')\n      .attr('pointer-events', 'none')\n      .text(abbr);\n    });\n\t// HQ coordinates [lat, lng] → projected to SVG\n    const hqLocations = [\n      { region:'western', name:'Denver',  coords: [39.7392, -104.9903], anchor:'start',  dx:  12, dy: 0 },\n      { region:'central', name:'Dallas',  coords: [32.7767,  -96.7970], anchor:'start',  dx:  12, dy: 14 },\n      { region:'eastern', name:'Miami',   coords: [25.7617,  -80.1918], anchor:'end',    dx: -12, dy: 0 },\n    ];\n\n    hqLocations.forEach(({ region, name, coords, anchor, dx, dy }) => {\n      const projected = proj([ coords[1], coords[0] ]);\n      if (!projected) return;\n      const [px, py] = projected;\n      const color = regionColors[region];\n\n      const g = svg.append('g')\n        .attr('class', 'hq-group')\n        .attr('transform', `translate(${px}, ${py})`)\n        .on('click', () => showModal(region));\n\n      // Pulsing halo (region color, faded)\n      g.append('circle')\n        .attr('class','hq-pulse')\n        .attr('r', 7)\n        .attr('fill', color)\n        .attr('opacity', 0.45)\n        .attr('pointer-events', 'none');\n\n      // Outer white ring with shadow\n      g.append('circle')\n        .attr('r', 7)\n        .attr('fill', '#ffffff')\n        .attr('stroke', color)\n        .attr('stroke-width', 2.5)\n        .attr('filter', 'url(#hqShadow)');\n\n      // Inner solid core (region color)\n      g.append('circle')\n        .attr('class','hq-core')\n        .attr('r', 3)\n        .attr('fill', color)\n        .attr('pointer-events', 'none');\n\n      // Label pill — anchored to side\n      const labelX = dx;\n      const labelY = dy;\n      const padX = 6, padY = 3;\n      // Approximate text width: name length × ~5.6px at 9.5/700\n      const textW = name.length * 5.6;\n      const pillW = textW + padX * 2;\n      const pillH = 16;\n      const pillX = anchor === 'end' ? (labelX - pillW) : labelX;\n      const pillY = labelY - pillH / 2;\n\n      g.append('rect')\n        .attr('class','hq-label-bg')\n        .attr('x', pillX)\n        .attr('y', pillY)\n        .attr('width', pillW)\n        .attr('height', pillH)\n        .attr('rx', 8)\n        .attr('ry', 8)\n        .attr('filter', 'url(#hqShadow)')\n        .attr('pointer-events', 'none');\n\n      // Small region-color dot at the leading edge of the pill\n      const dotX = anchor === 'end' ? (pillX + pillW - padX) : (pillX + padX);\n      g.append('circle')\n        .attr('cx', dotX)\n        .attr('cy', labelY)\n        .attr('r', 2)\n        .attr('fill', color)\n        .attr('pointer-events', 'none');\n\n      g.append('text')\n        .attr('class','hq-label-text')\n        .attr('x', anchor === 'end' ? (dotX - 5) : (dotX + 5))\n        .attr('y', labelY)\n        .attr('text-anchor', anchor)\n        .text(name);\n    });\n});\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
